<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linhfood Action-First</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CDN for rapid rendering -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#8e4900",
                        "primary-fixed": "#fd8603",
                        "primary-fixed-dim": "#e97b00",
                        "primary-container": "#fd8603",
                        "on-primary": "#fff0e7",
                        "on-primary-container": "#421e00",
                        "secondary": "#3b5f78",
                        "on-secondary": "#e9f4ff",
                        "secondary-container": "#bce1ff",
                        "on-secondary-container": "#2d526b",
                        "tertiary": "#715800",
                        "on-tertiary": "#fff1d6",
                        "tertiary-container": "#fccc33",
                        "on-tertiary-container": "#594500",
                        "error": "#b02500",
                        "on-error": "#ffefec",
                        "error-container": "#f95630",
                        "on-error-container": "#520c00",
                        "background": "#f6f6f6",
                        "on-background": "#2d2f2f",
                        "surface": "#f6f6f6",
                        "on-surface": "#2d2f2f",
                        "surface-variant": "#dbdddd",
                        "on-surface-variant": "#5a5c5c",
                        "outline": "#757777",
                        "outline-variant": "#acadad",
                        "surface-container-highest": "#dbdddd",
                        "surface-container-high": "#e1e3e3",
                        "surface-container": "#e7e8e8",
                        "surface-container-low": "#f0f1f1",
                        "surface-container-lowest": "#ffffff"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hero-gradient { background: linear-gradient(135deg, #8e4900 0%, #fd8603 100%); }
        .btn-primary-gradient { background: linear-gradient(to right, #8e4900, #fd8603); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
